name: Release

on:
  push:
    branches: [main]

# Ensure only one release run proceeds at a time.
concurrency: release-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Version PR or GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # With pending changesets: opens/updates a "Version Packages" PR.
      # Once that PR is merged (no changesets left): runs `pnpm release`,
      # which builds the bundle, tags v<version>, and creates a GitHub Release
      # with the built .js attached.
      - name: Version PR or release
        uses: changesets/action@v1
        with:
          version: pnpm changeset:version
          publish: pnpm release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
